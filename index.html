<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>CKast</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100%;
            height: 100%;
            background-color: #1e1a18;
            overflow: hidden;
            font-family: 'Segoe UI', Arial, sans-serif;
            color: #efebe9;
        }

        video {
            position: fixed;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
            z-index: 1;
        }

        /* ── Splash Overlay ── */
        #connectOverlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            z-index: 100;
            display: -webkit-flex;
            display: flex;
            -webkit-flex-direction: column;
            flex-direction: column;
            -webkit-align-items: center;
            align-items: center;
            -webkit-justify-content: center;
            justify-content: center;
            background-color: #1e1a18;
            background-image: radial-gradient(ellipse 80% 60% at 50% 50%, #392c25 0%, #1e1a18 68%);
            -webkit-transition: opacity 1.2s ease;
            transition: opacity 1.2s ease;
        }
        #connectOverlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        /* Decorative rings — centered via absolute+transform */
        .rings-wrap {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
        }
        .ring {
            position: absolute;
            border-radius: 50%;
            border: 1px solid rgba(217, 119, 87, 0.1);
            -webkit-transform: translate(-50%, -50%);
            transform: translate(-50%, -50%);
            -webkit-animation: breathe 6s ease-in-out infinite;
            animation: breathe 6s ease-in-out infinite;
        }
        .ring:nth-child(1) { width: 260px; height: 260px; border-color: rgba(217,119,87,0.2); -webkit-animation-delay:0s; animation-delay:0s; }
        .ring:nth-child(2) { width: 400px; height: 400px; -webkit-animation-delay:0.8s; animation-delay:0.8s; }
        .ring:nth-child(3) { width: 540px; height: 540px; -webkit-animation-delay:1.6s; animation-delay:1.6s; }
        .ring:nth-child(4) { width: 680px; height: 680px; -webkit-animation-delay:2.4s; animation-delay:2.4s; }

        @-webkit-keyframes breathe {
            0%, 100% { opacity: 0.3; }
            50%       { opacity: 0.9; }
        }
        @keyframes breathe {
            0%, 100% { opacity: 0.3; }
            50%       { opacity: 0.9; }
        }

        /* ── Content ── */
        .content {
            position: relative;
            z-index: 10;
            text-align: center;
            display: -webkit-flex;
            display: flex;
            -webkit-flex-direction: column;
            flex-direction: column;
            -webkit-align-items: center;
            align-items: center;
        }

        /* SVG Icon */
        .logo-icon {
            margin-bottom: 28px;
            -webkit-animation: fadeUp 1s ease 0.2s both;
            animation: fadeUp 1s ease 0.2s both;
        }

        /* Wordmark */
        .eyebrow {
            font-size: 11px;
            font-weight: 400;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: #7da27e;
            margin-bottom: 14px;
            -webkit-animation: fadeUp 1s ease 0.45s both;
            animation: fadeUp 1s ease 0.45s both;
        }

        .logo {
            font-family: Georgia, 'Times New Roman', serif;
            font-size: 80px;
            font-weight: 400;
            letter-spacing: -1px;
            color: #efebe9;
            line-height: 1;
            -webkit-animation: fadeUp 1s ease 0.6s both;
            animation: fadeUp 1s ease 0.6s both;
        }
        .logo .accent { color: #d97757; }

        .divider {
            width: 40px;
            height: 1px;
            background: #d97757;
            margin: 24px auto;
            opacity: 0.55;
            -webkit-animation: fadeIn 1s ease 0.9s both;
            animation: fadeIn 1s ease 0.9s both;
        }

        #connectStatus {
            font-size: 15px;
            font-weight: 300;
            letter-spacing: 0.4px;
            color: #a19d9b;
            -webkit-animation: fadeIn 1s ease 1.1s both;
            animation: fadeIn 1s ease 1.1s both;
            display: -webkit-flex;
            display: flex;
            -webkit-align-items: center;
            align-items: center;
            gap: 10px;
        }

        .dot {
            display: inline-block;
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #7da27e;
            -webkit-flex-shrink: 0;
            flex-shrink: 0;
            -webkit-animation: dotpulse 1.8s ease-in-out infinite;
            animation: dotpulse 1.8s ease-in-out infinite;
        }

        .corner-tag {
            position: fixed;
            bottom: 32px;
            right: 40px;
            font-size: 11px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: rgba(161,157,155,0.22);
            z-index: 10;
            -webkit-animation: fadeIn 2s ease 2s both;
            animation: fadeIn 2s ease 2s both;
        }

        @-webkit-keyframes fadeUp {
            from { opacity: 0; -webkit-transform: translateY(14px); transform: translateY(14px); }
            to   { opacity: 1; -webkit-transform: translateY(0); transform: translateY(0); }
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(14px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @-webkit-keyframes fadeIn {
            from { opacity: 0; }
            to   { opacity: 1; }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to   { opacity: 1; }
        }
        @-webkit-keyframes dotpulse {
            0%, 100% { opacity: 0.2; }
            50%       { opacity: 1; }
        }
        @keyframes dotpulse {
            0%, 100% { opacity: 0.2; }
            50%       { opacity: 1; }
        }

        /* SVG cast animation */
        @-webkit-keyframes arcfade {
            0%, 100% { opacity: 0.2; }
            50%       { opacity: 1; }
        }
        @keyframes arcfade {
            0%, 100% { opacity: 0.2; }
            50%       { opacity: 1; }
        }
    </style>
</head>
<body>
    <div id="connectOverlay">

        <!-- Decorative rings -->
        <div class="rings-wrap">
            <div class="ring"></div>
            <div class="ring"></div>
            <div class="ring"></div>
            <div class="ring"></div>
        </div>

        <!-- Main content -->
        <div class="content">

            <!-- Inline SVG Logo Mark -->
            <div class="logo-icon">
                <svg width="88" height="88" viewBox="0 0 88 88" xmlns="http://www.w3.org/2000/svg">
                    <!-- Outer decorative ring -->
                    <circle cx="44" cy="44" r="42" fill="none" stroke="#d97757" stroke-width="0.75" opacity="0.25"/>

                    <!-- Monitor screen body -->
                    <rect x="18" y="24" width="52" height="32" rx="4"
                          fill="none" stroke="#efebe9" stroke-width="1.8" opacity="0.75"/>

                    <!-- Monitor stand neck -->
                    <line x1="44" y1="56" x2="44" y2="62"
                          stroke="#efebe9" stroke-width="1.8" opacity="0.4" stroke-linecap="round"/>

                    <!-- Monitor stand base -->
                    <line x1="34" y1="62" x2="54" y2="62"
                          stroke="#efebe9" stroke-width="1.8" opacity="0.4" stroke-linecap="round"/>

                    <!-- Cast dot (bottom-left of screen) -->
                    <circle cx="26" cy="52" r="3" fill="#d97757"/>

                    <!-- Cast arc 1 (inner) -->
                    <path d="M 20 47 Q 20 38 29 38"
                          fill="none" stroke="#d97757" stroke-width="2.2"
                          stroke-linecap="round" opacity="0.9"
                          style="-webkit-animation: arcfade 2s ease-in-out 0.2s infinite; animation: arcfade 2s ease-in-out 0.2s infinite;"/>

                    <!-- Cast arc 2 (mid) -->
                    <path d="M 15 50 Q 15 32 33 32"
                          fill="none" stroke="#d97757" stroke-width="1.8"
                          stroke-linecap="round" opacity="0.55"
                          style="-webkit-animation: arcfade 2s ease-in-out 0.6s infinite; animation: arcfade 2s ease-in-out 0.6s infinite;"/>

                    <!-- Cast arc 3 (outer, sage green) -->
                    <path d="M 10 53 Q 10 26 37 26"
                          fill="none" stroke="#7da27e" stroke-width="1.5"
                          stroke-linecap="round" opacity="0.45"
                          style="-webkit-animation: arcfade 2s ease-in-out 1s infinite; animation: arcfade 2s ease-in-out 1s infinite;"/>
                </svg>
            </div>

            <p class="eyebrow">Screen Casting</p>
            <h1 class="logo">C<span class="accent">K</span>ast</h1>
            <div class="divider"></div>
            <p id="connectStatus">
                <span class="dot"></span>
                <span id="connectStatusText">Connecting to server...</span>
            </p>
        </div>

        <p class="corner-tag">Local Stream</p>
    </div>

    <!-- Video Player -->
    <video id="screenVideo" autoplay muted></video>

    <script src="js/main.js"></script>
</body>
</html>
